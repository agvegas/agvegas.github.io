<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Permiso B — DGT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  background: #1e293b;
  border-bottom: 3px solid #f59e0b;
  padding: 16px 20px;
  text-align: center;
}
header h1 { font-size: 1.4rem; font-weight: 700; color: #f59e0b; }
header p { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }

.container {
  width: 100%;
  max-width: 700px;
  padding: 20px;
  flex: 1;
}

/* Start screen */
.start-screen { text-align: center; padding: 40px 0; }
.start-screen h2 { font-size: 1.6rem; margin-bottom: 12px; }
.start-screen p { color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
.start-screen .info-cards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
.info-card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 16px 20px;
  min-width: 120px;
}
.info-card .num { font-size: 1.8rem; font-weight: 700; color: #f59e0b; }
.info-card .label { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

.btn {
  background: #f59e0b;
  color: #0f172a;
  border: none;
  padding: 14px 36px;
  font-size: 1rem;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { background: #d97706; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-outline {
  background: transparent;
  border: 2px solid #f59e0b;
  color: #f59e0b;
}
.btn-outline:hover { background: #f59e0b20; }

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 6px;
  background: #334155;
  border-radius: 3px;
  margin-bottom: 24px;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f59e0b, #ef4444);
  border-radius: 3px;
  transition: width .3s;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: #94a3b8;
  margin-bottom: 8px;
}
.progress-text .timer { color: #f87171; font-weight: 600; }

/* Question card */
.question-card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 16px;
}
.question-num {
  font-size: 0.75rem;
  color: #f59e0b;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.question-text {
  font-size: 1.05rem;
  line-height: 1.5;
  margin-bottom: 20px;
}
.question-image {
  max-width: 100%;
  border-radius: 8px;
  margin-bottom: 16px;
  border: 1px solid #334155;
}

/* Option buttons */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  background: #0f172a;
  border: 2px solid #334155;
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.95rem;
  text-align: left;
  color: #e2e8f0;
}
.option:hover { border-color: #f59e0b; background: #1e293b; }
.option.selected { border-color: #f59e0b; background: #f59e0b15; }
.option.correct { border-color: #22c55e; background: #22c55e15; }
.option.wrong { border-color: #ef4444; background: #ef444415; }
.option .letter {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: #334155;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem;
  flex-shrink: 0;
}
.option.correct .letter { background: #22c55e; color: #0f172a; }
.option.wrong .letter { background: #ef4444; color: white; }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 0.9rem;
  line-height: 1.5;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: #22c55e15; border: 1px solid #22c55e40; color: #86efac; }
.feedback.wrong { background: #ef444415; border: 1px solid #ef444440; color: #fca5a5; }

/* Navigation */
.nav-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }

/* Results screen */
.results { text-align: center; padding: 20px 0; }
.result-card {
  background: #1e293b;
  border: 2px solid #334155;
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 20px;
}
.score-circle {
  width: 140px; height: 140px;
  border-radius: 50%;
  border: 8px solid #334155;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.score-circle .score-num { font-size: 2.4rem; font-weight: 800; }
.score-circle .score-label { font-size: 0.75rem; color: #94a3b8; }
.score-circle.pass { border-color: #22c55e; }
.score-circle.pass .score-num { color: #22c55e; }
.score-circle.fail { border-color: #ef4444; }
.score-circle.fail .score-num { color: #ef4444; }

.result-stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.stat { background: #0f172a; border-radius: 10px; padding: 14px 20px; min-width: 80px; }
.stat .val { font-size: 1.4rem; font-weight: 700; }
.stat .lbl { font-size: 0.7rem; color: #94a3b8; }
.stat .val.green { color: #22c55e; }
.stat .val.red { color: #ef4444; }

/* Review */
.review-item {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  text-align: left;
}
.review-item .q { font-size: 0.9rem; margin-bottom: 8px; }
.review-item .a { font-size: 0.8rem; color: #94a3b8; }
.review-item .your { display: inline-block; padding: 2px 10px; border-radius: 5px; font-size: 0.78rem; margin-left: 8px; }
.review-item .your.ok { background: #22c55e30; color: #86efac; }
.review-item .your.ko { background: #ef444430; color: #fca5a5; }

footer { padding: 16px; font-size: 0.7rem; color: #475569; text-align: center; }

.hidden { display: none !important; }

@media (max-width: 500px) {
  .container { padding: 12px; }
  .question-card { padding: 16px; }
  .question-text { font-size: 0.95rem; }
  .option { padding: 12px 14px; font-size: 0.88rem; }
  .info-cards { gap: 8px; }
  .info-card { padding: 12px 14px; min-width: 90px; }
}
</style>
</head>
<body>

<header>
  <h1>🚗 Test Permiso B</h1>
  <p>Simulacro de examen DGT — Actualizado 2026</p>

<div class="container" id="app"></div>

<footer>Preguntas basadas en el temario oficial de la DGT. Solo para práctica.</footer>

// ═══════════════════ QUESTION BANK ═══════════════════
const questionBank = [

  {
    q: "¿Se puede adelantar por la derecha en autopista?",

  {
    q: "En un túnel con un carril por sentido, ¿puedes adelantar?",
    opts: ["Sí, si hay visibilidad", "No, está prohibido", "Solo si no hay línea continua"],

    topic: "Adelantamiento",
    explanation: "En túneles con un solo carril por sentido está prohibido adelantar. En túneles con más carriles, se aplican las normas generales."

    explanation: "Los menores de 12 años pueden viajar en el asiento delantero siempre que usen un sistema de retención homologado adecuado a su talla y peso."
  },
  {

    opts: ["1,25 metros", "1,35 metros", "1,50 metros"],
    correct: 1,
    topic: "Carga",
    explanation: "Es obligatorio el uso de sistemas de retención infantil para menores con estatura inferior a 1,35 metros. Recomendado hasta 1,50 metros."
  },

  // NEUMÁTICOS
  {
    q: "La profundidad mínima legal del dibujo de los neumáticos es:",
    opts: ["1,0 mm", "1,6 mm", "2,0 mm"],
    correct: 1,
    topic: "Seguridad",
    explanation: "La profundidad mínima legal del dibujo es de 1,6 mm en las ranuras principales. Se recomienda cambiar a los 3 mm para mantener buena adherencia en mojado."
  },

  // ACCIDENTES
  {

    opts: ["Solo si eres el causante", "Sí, es obligatorio para todo conductor implicado o testigo", "Solo si hay peligro de muerte"],
    correct: 1,
    topic: "Seguridad",
    explanation: "Todo conductor o usuario de la vía implicado o testigo de un accidente está obligado a auxiliar a las víctimas dentro de sus posibilidades. La omisión del deber de socorro es delito."
  },
  {
    q: "Protocolo PAS en accidentes significa:",
    opts: ["Parar, Avisar, Socorrer", "Proteger, Avisar, Socorrer", "Prevenir, Auxiliar, Salir"],
    correct: 1,

// ═══════════════ APP STATE ═══════════════
const TOTAL_QUESTIONS = 30; // DGT test: 30 questions
let questions = [];
let currentIndex = 0;
let answers = []; // { selected: int|null, time: int }
let startTime = 0;
let questionStartTime = 0;
let timerInterval = null;

// ═══════════════ HELPERS ═══════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ═══════════════ RENDER ═══════════════
function showStartScreen() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="start-screen">
      <h2>🎯 Simulacro de Examen</h2>
      <p>30 preguntas tipo test. Máximo 30 minutos.<br>3 errores permitidos. ¿Preparado?</p>
      <div class="info-cards">
        <div class="info-card"><div class="num">30</div><div class="label">Preguntas</div></div>
        <div class="info-card"><div class="num">30'</div><div class="label">Tiempo</div></div>
        <div class="info-card"><div class="num">3</div><div class="label">Fallos máx.</div></div>
        <div class="info-card"><div class="num">${questionBank.length}</div><div class="label">En el banco</div></div>
      </div>
      <button class="btn" onclick="startTest()">▶ Comenzar Test</button>
    </div>
  `;
}

function startTest() {
  questions = shuffle(questionBank).slice(0, TOTAL_QUESTIONS);
  currentIndex = 0;
  answers = questions.map(() => ({ selected: null, time: 0 }));
  startTime = Date.now();
  questionStartTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  renderQuestion();
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const timerEl = document.getElementById('globalTimer');
  if (timerEl) timerEl.textContent = formatTime(elapsed);
}

function nextQuestion() {
  const q = questions[currentIndex];
  const a = answers[currentIndex];
  if (!a.selected && a.selected !== 0) return; // must answer
  
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    questionStartTime = Date.now();
    renderQuestion();
  } else {
    clearInterval(timerInterval);
    showResults();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    questionStartTime = Date.now();
    renderQuestion();
  }
}

function selectAnswer(optIndex) {
  const a = answers[currentIndex];
  if (a.selected !== null) return; // already answered
  
  a.selected = optIndex;
  a.time = Math.floor((Date.now() - questionStartTime) / 1000);
  
  renderFeedback();
}

function renderQuestion() {
  const q = questions[currentIndex];
  const a = answers[currentIndex];
  const answered = a.selected !== null;
  const percent = ((currentIndex + (answered ? 1 : 0)) / questions.length * 100);
  
  const app = document.getElementById('app');
  const letters = ['A', 'B', 'C'];
  
  app.innerHTML = `
    <div class="progress-text">
      <span>Pregunta ${currentIndex + 1}/${questions.length}</span>
      <span class="timer" id="globalTimer">${formatTime(Math.floor((Date.now() - startTime) / 1000))}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
    
    <div class="question-card">
      <div class="question-num">${q.topic} · Pregunta ${currentIndex + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="optionsContainer">
        ${q.opts.map((opt, i) => `
          <button class="option ${a.selected === i ? (i === q.correct ? 'correct' : 'wrong') : ''} ${a.selected === null ? '' : (i === q.correct ? 'correct' : '')}"
                  onclick="selectAnswer(${i})"
                  ${answered ? 'disabled' : ''}>
            <span class="letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback ${answered ? 'show' : ''} ${a.selected === q.correct ? 'correct' : 'wrong'}" id="feedback">
        ${answered ? (a.selected === q.correct ? '✅ ¡Correcto! ' : '❌ Incorrecto. ') + q.explanation : ''}
      </div>
    </div>

    <div class="nav-buttons">
      ${currentIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← Anterior</button>` : ''}
      ${answered ? `<button class="btn" onclick="nextQuestion()">${currentIndex < questions.length - 1 ? 'Siguiente →' : 'Ver Resultados 📊'}</button>` : ''}
    </div>
  `;
}

function renderFeedback() {
  // Just re-render with feedback shown
  const q = questions[currentIndex];
  const a = answers[currentIndex];
  const app = document.getElementById('app');
  
  // Update options visually
  const opts = app.querySelectorAll('.option');
  const letters = ['A', 'B', 'C'];
  opts.forEach((el, i) => {
    el.disabled = true;
    el.classList.remove('selected', 'correct', 'wrong');
    if (i === a.selected) el.classList.add(i === q.correct ? 'correct' : 'wrong');
    if (i === q.correct && a.selected !== q.correct) el.classList.add('correct');
  });
  
  // Show feedback
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  fb.classList.add(a.selected === q.correct ? 'correct' : 'wrong');
  fb.textContent = (a.selected === q.correct ? '✅ ¡Correcto! ' : '❌ Incorrecto. ') + q.explanation;
  
  // Update nav buttons
  const nav = app.querySelector('.nav-buttons');
  nav.innerHTML = `
    ${currentIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← Anterior</button>` : ''}
    <button class="btn" onclick="nextQuestion()">${currentIndex < questions.length - 1 ? 'Siguiente →' : 'Ver Resultados 📊'}</button>
  `;
}

function showResults() {
  const correct = answers.filter((a, i) => a.selected === questions[i].correct).length;
  const wrong = answers.length - correct;
  const totalTime = Math.floor((Date.now() - startTime) / 1000);
  const passed = wrong <= 3;
  const app = document.getElementById('app');
  
  app.innerHTML = `
    <div class="results">
      <div class="result-card">
        <div class="score-circle ${passed ? 'pass' : 'fail'}">
          <div class="score-num">${Math.round(correct / questions.length * 100)}%</div>
          <div class="score-label">${correct}/${questions.length}</div>
        </div>
        <h2>${passed ? '🎉 ¡APTO!' : '📚 No Apto'}</h2>
        <p style="color:#94a3b8;margin-top:8px;">${passed ? 'Has superado el simulacro. ¡Enhorabuena!' : `Has tenido ${wrong} fallos. El máximo permitido es 3. ¡Sigue practicando!`}</p>
        <p style="color:#64748b;margin-top:4px;">Tiempo total: ${formatTime(totalTime)}</p>
      </div>
      
      <div class="result-stats">
        <div class="stat"><div class="val green">${correct}</div><div class="lbl">Aciertos</div></div>
        <div class="stat"><div class="val red">${wrong}</div><div class="lbl">Fallos</div></div>
        <div class="stat"><div class="val" style="color:#f59e0b">${formatTime(totalTime)}</div><div class="lbl">Tiempo</div></div>
        <div class="stat"><div class="val" style="color:#60a5fa">${Math.round(totalTime / questions.length)}s</div><div class="lbl">Media/preg.</div></div>
      </div>

      <div style="margin: 20px 0;">
        <button class="btn" onclick="startTest()">🔄 Nuevo Test</button>
        <button class="btn btn-outline" onclick="showStartScreen()" style="margin-left:8px;">🏠 Inicio</button>
      </div>
      
      <h3 style="text-align:left;margin-top:24px;margin-bottom:12px;">📋 Revisión</h3>
      ${questions.map((q, i) => {
        const a = answers[i];
        const ok = a.selected === q.correct;
        return `
          <div class="review-item">
            <div class="q">${i + 1}. ${q.q} <span class="your ${ok ? 'ok' : 'ko'}">${ok ? '✓' : '✗'}</span></div>
            <div class="a">
              Tu respuesta: ${a.selected !== null ? q.opts[a.selected] : 'Sin contestar'}<br>
              Correcta: ${q.opts[q.correct]}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════ INIT ═══════════════
showStartScreen();
</script>
</body>
</html>
